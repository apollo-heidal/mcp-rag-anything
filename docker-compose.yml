services:
    rag-anywhere:
        build: .
        ports:
            - "8000:8000"
        volumes:
            - ./rag_storage:/root/.rag_storage
            - ./hf_cache:/root/.cache/huggingface
        environment:
            - OPENAI_API_KEY=docker-model-runner
            - RAG_WORKING_DIR=/root/.rag_storage
            - APP_BASE_URL=${APP_BASE_URL:-http://localhost:8000}
            - RAG_SESSION_SECRET=${RAG_SESSION_SECRET:-change-me-for-production}
            - UI_SESSION_TTL_SECONDS=${UI_SESSION_TTL_SECONDS:-900}
            - UPLOAD_LINK_TTL_SECONDS=${UPLOAD_LINK_TTL_SECONDS:-900}
            - FASTMCP_HOST=0.0.0.0
            - DEFAULT_COLLECTION_ID=default
            - VISION_REQUIRED=${VISION_REQUIRED:-true}
            - VIDEO_ENGINE_ENABLED=${VIDEO_ENGINE_ENABLED:-true}
            - VIDEO_SEGMENT_LENGTH=${VIDEO_SEGMENT_LENGTH:-30}
            - AUDIO_TRANSCRIBE_MODEL=${AUDIO_TRANSCRIBE_MODEL}
            - WHISPER_API_BASE=${WHISPER_API_BASE:-http://whisper:8080}
            - EMBEDDING_DIM=${EMBEDDING_DIM}
            # MinerU: offload VLM inference to Docker Model Runner (uses Metal on host)
            # If MinerU needs a separate VLM model, provision it through the local Docker Model Runner workflow.
            - MINERU_BACKEND=pipeline
            - MILVUS_URI=${MILVUS_URI:-http://milvus:19530}
            - MILVUS_DB_NAME=${MILVUS_DB_NAME:-default}
            - ATTU_URL=${ATTU_URL:-http://localhost:3000}
        models:
            llm:
                endpoint_var: LLM_API_BASE
                model_var: LLM_MODEL
            vision:
                endpoint_var: VISION_API_BASE
                model_var: VISION_MODEL
            embedding:
                endpoint_var: EMBEDDING_API_BASE
                model_var: EMBEDDING_MODEL
        depends_on:
            whisper:
                condition: service_healthy
            milvus:
                condition: service_healthy

    whisper:
        build:
            context: .
            dockerfile: whisper.Dockerfile
        command:
            - --host
            - "0.0.0.0"
            - --port
            - "8080"
            - -m
            - /models/ggml-small.bin
            - -t
            - "4"
            - --convert
        volumes:
            - ./whisper_models:/models
        ports:
            - "8080:8080"
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
            interval: 10s
            timeout: 5s
            retries: 12
            start_period: 30s

    etcd:
        image: quay.io/coreos/etcd:v3.5.18
        environment:
            - ETCD_AUTO_COMPACTION_MODE=revision
            - ETCD_AUTO_COMPACTION_RETENTION=1000
            - ETCD_QUOTA_BACKEND_BYTES=4294967296
            - ETCD_SNAPSHOT_COUNT=50000
        volumes:
            - etcd_data:/etcd
        command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
        healthcheck:
            test: ["CMD", "etcdctl", "endpoint", "health"]
            interval: 30s
            timeout: 20s
            retries: 3

    minio:
        image: minio/minio:RELEASE.2024-11-07T00-52-20Z
        environment:
            MINIO_ACCESS_KEY: minioadmin
            MINIO_SECRET_KEY: minioadmin
        volumes:
            - minio_data:/minio_data
        command: minio server /minio_data --console-address ":9001"
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
            interval: 30s
            timeout: 20s
            retries: 3

    milvus:
        image: milvusdb/milvus:v2.5.6
        command: ["milvus", "run", "standalone"]
        environment:
            ETCD_ENDPOINTS: etcd:2379
            MINIO_ADDRESS: minio:9000
        volumes:
            - milvus_data:/var/lib/milvus
        ports:
            - "19530:19530"
            - "9091:9091"
        depends_on:
            etcd:
                condition: service_healthy
            minio:
                condition: service_healthy
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
            interval: 30s
            timeout: 20s
            retries: 3

    attu:
        image: zilliz/attu:v2.4.12
        environment:
            MILVUS_URL: milvus:19530
        ports:
            - "3000:3000"
        depends_on:
            milvus:
                condition: service_healthy

volumes:
    etcd_data:
    minio_data:
    milvus_data:

models:
    llm:
        model: ${LLM_MODEL}
    vision:
        model: ${VISION_MODEL}
    embedding:
        model: ${EMBEDDING_MODEL}
