services:
  mcp-rag:
    build: .
    stdin_open: true
    tty: true
    volumes:
      - rag_storage:/root/.rag_storage
    environment:
      - LLM_API_BASE=http://host.docker.internal:12434/engines/llama.cpp/v1
      - LLM_MODEL=ai/qwen3.5:2b-instruct-Q4_K_M
      - EMBEDDING_MODEL=ai/qwen3-embedding:0.6b-Q4_K_M
      - OPENAI_API_KEY=docker-model-runner
      - RAG_WORKING_DIR=/root/.rag_storage
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  rag_storage:
