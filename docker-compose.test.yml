services:
    rag-anywhere-test:
        build: .
        ports:
            - "8001:8000"
        volumes:
            - ./rag_storage_test:/root/.rag_storage
            - ./hf_cache:/root/.cache/huggingface
        environment:
            - OPENAI_API_KEY=docker-model-runner
            - RAG_WORKING_DIR=/root/.rag_storage
            - APP_BASE_URL=http://localhost:8001
            - RAG_SESSION_SECRET=test-secret
            - UI_SESSION_TTL_SECONDS=3600
            - UPLOAD_LINK_TTL_SECONDS=3600
            - FASTMCP_HOST=0.0.0.0
            - DEFAULT_COLLECTION_ID=default
            - VISION_REQUIRED=false
            - VIDEO_ENGINE_ENABLED=false
            - AUDIO_TRANSCRIBE_MODEL=openai/whisper-small
            - MINERU_BACKEND=pipeline
            - MILVUS_URI=http://milvus:19530
            - MILVUS_DB_NAME=default
        models:
            llm:
                endpoint_var: LLM_API_BASE
                model_var: LLM_MODEL
            vision:
                endpoint_var: VISION_API_BASE
                model_var: VISION_MODEL
            embedding:
                endpoint_var: EMBEDDING_API_BASE
                model_var: EMBEDDING_MODEL
        depends_on:
            milvus:
                condition: service_healthy

    etcd:
        image: quay.io/coreos/etcd:v3.5.18
        environment:
            - ETCD_AUTO_COMPACTION_MODE=revision
            - ETCD_AUTO_COMPACTION_RETENTION=1000
            - ETCD_QUOTA_BACKEND_BYTES=4294967296
            - ETCD_SNAPSHOT_COUNT=50000
        volumes:
            - etcd_test_data:/etcd
        command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
        healthcheck:
            test: ["CMD", "etcdctl", "endpoint", "health"]
            interval: 30s
            timeout: 20s
            retries: 3

    minio:
        image: minio/minio:RELEASE.2024-11-07T00-52-20Z
        environment:
            MINIO_ACCESS_KEY: minioadmin
            MINIO_SECRET_KEY: minioadmin
        volumes:
            - minio_test_data:/minio_data
        command: minio server /minio_data --console-address ":9001"
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
            interval: 30s
            timeout: 20s
            retries: 3

    milvus:
        image: milvusdb/milvus:v2.5.6
        command: ["milvus", "run", "standalone"]
        environment:
            ETCD_ENDPOINTS: etcd:2379
            MINIO_ADDRESS: minio:9000
        volumes:
            - milvus_test_data:/var/lib/milvus
        ports:
            - "19531:19530"
        depends_on:
            etcd:
                condition: service_healthy
            minio:
                condition: service_healthy
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
            interval: 30s
            timeout: 20s
            retries: 3

volumes:
    etcd_test_data:
    minio_test_data:
    milvus_test_data:

models:
    llm:
        model: ${LLM_MODEL:-hf.co/unsloth/Qwen3.5-2B-GGUF}
    vision:
        model: ${VISION_MODEL:-docker.io/local/qwen3.5-2b-vlm:latest}
    embedding:
        model: ${EMBEDDING_MODEL:-hf.co/unsloth/Qwen3-Embedding-0.6B}
